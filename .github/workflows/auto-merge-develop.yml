name: Auto Merge Develop Into Main

# Pattern adapted from thai_business_suite/.github/workflows/auto-merge.yml
#
# On every push to develop:
#   1. Run `npm test` (only safety gate before npm publish)
#   2. If tests pass, merge develop → main via a no-ff merge

on:
  push:
    branches:
      - develop

permissions:
  contents: write

jobs:
  test:
    name: Test (npm test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # Note: no `npm install` — this package has zero runtime
      # dependencies (only `peerDependencies` declarations).
      - name: Run tests
        run: npm test

  merge-to-main:
    name: Merge develop → main
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Merge develop → main
        run: |
          git fetch origin
          git checkout main
          git merge origin/develop --no-edit
          git push origin main
