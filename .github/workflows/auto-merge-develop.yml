name: Auto-Merge to Main

# Automatically creates a PR from develop → main when develop is pushed.
# Merges automatically if CI passes.
# The release workflow then triggers on tag push to main.

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    name: Create PR to Main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --local user.email \
            "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_EXISTS=$(gh pr list \
            --head develop \
            --base main \
            --state open \
            --json number \
            --jq 'length')

          if [ "$PR_EXISTS" -gt 0 ]; then
            echo "PR already exists"
          else
            gh pr create \
              --base main \
              --head develop \
              --title "chore: merge develop to main" \
              --body 'Auto-generated PR to merge develop into main.

This PR is created automatically by the CI pipeline.
Merge this PR to trigger the release workflow.'
          fi

      - name: Auto-merge PR
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list \
            --head develop \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$PR_NUMBER" ]; then
            echo "Merging PR #$PR_NUMBER..."
            gh pr merge "$PR_NUMBER" --squash --delete-branch
          else
            echo "No open PR found to merge"
          fi
