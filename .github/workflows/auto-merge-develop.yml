name: Auto-Merge to Main

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    name: Create PR to Main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_EXISTS=$(gh pr list \
            --head develop \
            --base main \
            --state open \
            --json number \
            --jq 'length')

          if [ "$PR_EXISTS" -gt 0 ]; then
            echo "PR already exists, skipping"
            exit 0
          fi

          gh pr create \
            --base main \
            --head develop \
            --title "chore: merge develop to main" \
            --body "Auto PR to merge develop into main." \
            --label "autorelease"

          echo "PR created"

  merge-pr:
    name: Auto-Merge PR
    needs: create-pr
    runs-on: ubuntu-latest
    steps:
      - name: Enable Auto-Merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list \
            --head develop \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number')

          echo "Enabling auto-merge for PR #$PR_NUMBER"

          gh pr merge \
            --admin \
            --squash \
            --delete-branch false \
            --PR_NUMBER "$PR_NUMBER"

          echo "Done"
