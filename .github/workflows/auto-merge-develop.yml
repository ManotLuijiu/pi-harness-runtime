name: Auto-Merge to Main

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write
  statuses: read

concurrency:
  group: auto-merge-develop
  cancel-in-progress: true

jobs:
  create-pr:
    name: Create PR to Main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --local user.email \
            "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Create PR
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_EXISTS=$(gh pr list \
            --head develop \
            --base main \
            --state open \
            --json number \
            --jq 'length')

          if [ "$PR_EXISTS" -gt 0 ]; then
            echo "PR already exists"
            PR_NUMBER=$(gh pr list \
              --head develop \
              --base main \
              --state open \
              --json number \
              --jq '.[0].number')
            echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_OUTPUT
          else
            echo "Creating new PR..."
            gh pr create \
              --base main \
              --head develop \
              --title "chore: merge develop to main" \
              --body "Auto-generated PR to merge develop into main. This PR is created automatically by the CI pipeline."
            PR_NUMBER=$(gh pr list \
              --head develop \
              --base main \
              --state open \
              --json number \
              --jq '.[0].number')
            echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "Created PR #$PR_NUMBER"
          fi

      - name: Wait for CI checks to pass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.create-pr.outputs.PR_NUMBER }}"
          echo "Waiting for CI checks on PR #$PR_NUMBER..."
          TIMEOUT=600
          INTERVAL=15
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            ALL_PASSING=true
            for CHECK_STATUS in $(gh pr view $PR_NUMBER \
              --json statusCheckRollup \
              --jq '.statusCheckRollup[] | .conclusion'); do
              if [ "$CHECK_STATUS" != "SUCCESS" ] && \
                 [ "$CHECK_STATUS" != "SKIPPED" ] && \
                 [ "$CHECK_STATUS" != "NEUTRAL" ]; then
                ALL_PASSING=false
                break
              fi
            done
            if [ "$ALL_PASSING" = true ]; then
              echo "All CI checks passed!"
              exit 0
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
            echo "Waited ${ELAPSED}s..."
          done
          echo "TIMEOUT: CI checks did not pass within ${TIMEOUT}s"
          exit 1

      - name: Auto-merge PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.create-pr.outputs.PR_NUMBER }}"
          echo "Attempting to merge PR #$PR_NUMBER..."
          MERGEABLE=$(gh pr view $PR_NUMBER --json mergeable --jq '.mergeable')
          if [ "$MERGEABLE" = "false" ]; then
            echo "PR has merge conflicts, attempting rebase..."
            git fetch origin main
            if git rebase origin/main; then
              echo "Rebase successful, force pushing..."
              git push --force-with-lease origin develop
              sleep 5
            else
              echo "Rebase failed"
              git rebase --abort
              exit 1
            fi
          fi
          echo "Performing squash merge..."
          gh pr merge "$PR_NUMBER" --squash --delete-branch --auto

      - name: Report failure
        if: failure()
        run: |
          echo "Auto-merge failed. Please check CI status and resolve manually."
