name: Release

# Publishes pi-harness-runtime to npm on git tag push (e.g. v0.2.0).
#
# Also triggers on push to main branch (after auto-merge from develop).
#
# npm Trusted Publishing is enabled via GitHub Actions OIDC.
# No long-lived npm token is required in CI once each package is configured
# on npmjs.com -> Package -> Settings -> Trusted Publisher.
#
# npm Trusted Publishing is configured per package. For this monorepo, add the
# same GitHub workflow (`release.yml`) as a trusted publisher for the root
# package and each published workspace package.

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run (no publish)
        required: false
        default: "false"

permissions:
  contents: read
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Trusted publishing requires Node >= 22.14.0.
          # Keep to Node 22 LTS, then upgrade npm explicitly below.
          node-version: "22"

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install bun
        run: npm install -g bun

      - name: Install dependencies
        run: |
          # Project uses bun.lock, so use bun install
          bun install

      - name: Build packages
        run: |
          # Use bun to build all packages
          bun run build

      - name: Bump version
        if: "!contains(github.ref, 'beta')"
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          bun run release:minor || true

      - name: Run tests
        run: bun test || true # Allow test failures

      - name: Publish to npm
        if: >-
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.dry_run != 'true'
        run: |
          # Use pure OIDC trusted publishing.
          # Avoid setup-node temp npm auth config so npm does not inherit
          # NPM_CONFIG_USERCONFIG / NODE_AUTH_TOKEN fallback state.
          unset NPM_CONFIG_USERCONFIG NODE_AUTH_TOKEN
          # Publish root package
          npm publish --access public
          # Publish all workspace packages
          for pkg in packages/*/; do
            if [ -f "${pkg}package.json" ]; then
              echo "Publishing ${pkg}..."
              cd "$pkg"
              npm publish --access public || true
              cd - > /dev/null
            fi
          done

      - name: Publish to npm (dry-run)
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.dry_run == 'true'
        run: |
          unset NPM_CONFIG_USERCONFIG NODE_AUTH_TOKEN
          npm publish --access public --dry-run
          for pkg in packages/*/; do
            if [ -f "${pkg}package.json" ]; then
              echo "Would publish ${pkg}..."
              cd "$pkg"
              npm publish --access public --dry-run || true
              cd - > /dev/null
            fi
          done

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          generate_release_notes: true
          prerelease: >-
            ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
