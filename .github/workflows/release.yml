name: Release

# Publishes pi-harness-runtime to npm on git tag push (e.g. v0.2.0).
#
# Pattern adapted from frappe/.github/workflows/create-release.yml
# (uses secrets for auth to bypass 2FA).
#
# Required GitHub secrets:
#   NPM_TOKEN      — Granular Access Token from
#                    https://www.npmjs.com/settings/manotluijiu/tokens
#                    - Packages & scopes: "pi-harness-runtime", "Read and write"
#                    - ✅ Bypass 2FA
#                    Used as `NODE_AUTH_TOKEN` in the publish step (read by
#                    actions/setup-node when registry-url is set).
#   RELEASE_TOKEN  — GitHub Fine-Grained PAT (or Classic PAT) with `repo` scope
#                    Used by `gh release create` to attribute the release to
#                    your user instead of github-actions[bot]. Recommended.
#                    Create at: https://github.com/settings/tokens?type=beta
#                    Falls back to auto secrets.GITHUB_TOKEN if unset.
#
# LOCAL PUBLISH NOTE:
#   `npm publish` locally does NOT read NPM_TOKEN from env (it reads
#   ~/.npmrc first). Use `NPM_CONFIG_USERCONFIG=/tmp/npmrc` with a
#   .npmrc containing `//registry.npmjs.org/:_authToken=$NPM_TOKEN`,
#   or write a project .npmrc (gitignored). See .env.example for details.
#
# Trigger a release:
#   git tag v0.3.0
#   git push origin v0.3.0

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    name: Test (npm test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run tests
        run: npm test

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify package.json version matches tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::version mismatch: package.json=$VERSION, tag=v$TAG"
            exit 1
          fi
          echo "✅ version $VERSION matches tag"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
