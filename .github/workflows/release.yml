name: Release

# Publishes pi-harness-runtime to npm on git tag push (e.g. v0.2.0).
#
# Also triggers on push to main branch (after auto-merge from develop).
#
# npm Trusted Publishing is enabled via GitHub Actions OIDC.
# No long-lived npm token is required in CI once each package is configured
# on npmjs.com -> Package -> Settings -> Trusted Publisher.
#
# npm Trusted Publishing is configured per package. For this monorepo, add the
# same GitHub workflow (`release.yml`) as a trusted publisher for the root
# package and each published workspace package.

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run (no publish)
        required: false
        default: "false"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Trusted publishing requires Node >= 22.14.0.
          # Keep to Node 22 LTS, then upgrade npm explicitly below.
          node-version: "22"

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.18.0

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install bun
        run: npm install -g bun

      - name: Install dependencies
        run: |
          # Project uses bun.lock, so use bun install
          bun install

      - name: Build packages
        run: |
          # Use bun to build all packages
          bun run build

      - name: Run tests
        run: bun test test/*.test.mjs

      - name: Publish to npm
        if: >-
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.dry_run != 'true'
        run: |
          # Use pure OIDC trusted publishing.
          # Avoid setup-node temp npm auth config so npm does not inherit
          # NPM_CONFIG_USERCONFIG / NODE_AUTH_TOKEN fallback state.
          unset NPM_CONFIG_USERCONFIG NODE_AUTH_TOKEN

          publish_args() {
            local version
            version=$(node -p "require('./package.json').version")
            if [[ "$version" == *-* ]]; then
              echo "--access public --tag beta"
            else
              echo "--access public"
            fi
          }

          stage_dir() {
            local source_dir="$1"
            local staged_dir
            staged_dir=$(mktemp -d "${RUNNER_TEMP}/publish-stage-XXXXXX")
            rsync -a --delete \
              --exclude '.git' \
              --exclude 'node_modules' \
              "${source_dir%/}/" "${staged_dir}/"
            echo "$staged_dir"
          }

          publish_with_retry() {
            local max_retries=3
            local retry=1
            local name
            local version
            local args
            name=$(node -p "require('./package.json').name")
            version=$(node -p "require('./package.json').version")
            args=$(publish_args)

            while [ "$retry" -le "$max_retries" ]; do
              echo "Publish attempt ${retry}/${max_retries}"
              echo "Package: ${name}@${version}"
              echo "Directory: $(pwd)"
              echo "npm publish ${args}"
              if npm publish ${args}; then
                return 0
              fi
              if [ "$retry" -lt "$max_retries" ]; then
                local delay=$((retry * 5))
                echo "Publish failed; retrying in ${delay}s..."
                sleep "$delay"
              fi
              retry=$((retry + 1))
            done
            return 1
          }

          # Only the root pi-harness-runtime package is published.
          # Workspace packages (@pi-harness/*) are bundled into the root package
          # via the files whitelist and are NOT published individually — they
          # have no npm Trusted Publishing configured and are private to
          # this monorepo.

          root_stage=$(stage_dir ".")
          cd "$root_stage"
          echo "Root publish args: $(publish_args)"
          publish_with_retry
          cd - > /dev/null

      - name: Publish to npm (dry-run)
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.dry_run == 'true'
        run: |
          unset NPM_CONFIG_USERCONFIG NODE_AUTH_TOKEN

          publish_args() {
            local version
            version=$(node -p "require('./package.json').version")
            if [[ "$version" == *-* ]]; then
              echo "--access public --tag beta --dry-run"
            else
              echo "--access public --dry-run"
            fi
          }

          stage_dir() {
            local source_dir="$1"
            local staged_dir
            staged_dir=$(mktemp -d "${RUNNER_TEMP}/publish-stage-XXXXXX")
            rsync -a --delete \
              --exclude '.git' \
              --exclude 'node_modules' \
              "${source_dir%/}/" "${staged_dir}/"
            echo "$staged_dir"
          }

          # Dry-run: only root package.
          root_stage=$(stage_dir ".")
          cd "$root_stage"
          echo "Root publish args: $(publish_args)"
          npm publish $(publish_args)
          cd - > /dev/null
          echo "Skipping workspace packages: bundled into root package."

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          generate_release_notes: true
          make_latest: true
          prerelease: >-
            ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
