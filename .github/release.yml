# GitHub Auto-Generated Release Notes Configuration
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
      - github-actions
  categories:
    - title: "✨ Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - bugfix
        - fix
    - title: "🔧 Maintenance"
      labels:
        - chore
        - maintenance
        - dependencies
    - title: "📚 Documentation"
      labels:
        - documentation
        - docs
    - title: "⚡ Performance"
      labels:
        - performance
    - title: "✅ Tests"
      labels:
        - test
        - testing
    - title: "👷 CI/CD"
      labels:
        - ci
        - cd
        - automation
    - title: "🔄 Other Changes"
      labels:
        - "*"
